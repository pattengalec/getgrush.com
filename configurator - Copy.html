.sum-key{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;color:#3a5a3a;text-transform:uppercase}

.step-title{font-family:'Bebas Neue',sans-serif;font-size:36px;letter-spacing:.05em;line-height:1;margin-bottom:4px}

.grid6c{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-bottom:24px}

.card.easter.selected{background:rgba(255,68,68,.08);border-color:#FF4444}

.card.selected .card-dot{display:block}
.card.easter.selected .card-dot{background:#FF4444;box-shadow:0 0 8px #FF4444}
.card-icon{font-size:24px;margin-bottom:10px;display:block}
.card-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.2em;padding:2px 6px;border-radius:2px;display:inline-block;margin-bottom:10px;border:1px solid}

.card-sub{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.15em;color:#5a7a5a;margin-bottom:8px;text-transform:uppercase}

.discount-bar{background:#1a0808;border:1px solid #FF4444;border-radius:4px;padding:16px;margin-bottom:24px;display:flex;align-items:center;gap:12px}

let sel = {

  power:null, water:null, tier:null, offgrid:null,

};
let stepIndex = 0;

let genXTriggered = false;

function isAstro() { return sel.base === 'astro'; }
function steps() { return isAstro() ? ASTRO_STEPS : STD_STEPS; }
function currentStep() { return steps()[stepIndex]; }
function base() { return BASES.find(b => b.id === sel.base); }
function accent() { return base()?.accent || '#39FF14'; }

function hexToRgb(hex) {
  if (!hex) return '0,0,0';
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `${r},${g},${b}`;
}

function countEasterEggs() {
  let c = 0;
  if (sel.astro_tier === 'moonbase_alpha') c++;
  if (sel.astro_comms === 'rotary') c++;
  if (sel.astro_emergency === 'sharks') c++;
  return c;
}

// ─── RENDER ──────────────────────────────────────────────────────────────────
function render() {
  renderProgress();
  renderSummary();
  renderStep();
  document.getElementById('top-anchor').scrollIntoView({behavior:'smooth'});
}

function renderProgress() {
  const ss = steps();
  const wrap = document.getElementById('progress-wrap');
  wrap.innerHTML = ss.map((_,i) => {
    let cls = 'progress-step';
    if (i < stepIndex) cls += ' done';
    else if (i === stepIndex) cls += ' active';
    return `<div class="${cls}" style="background:${i<=stepIndex ? accent() : '#1e2a1e'};opacity:${i<stepIndex?.6:i===stepIndex?1:.3}"></div>`;
  }).join('') + `<span class="progress-label">${stepIndex+1}/${ss.length}</span>`;

  document.getElementById('title-accent').textContent = isAstro() ? 'LUNAR COTTAGE' : 'COTTAGE';
  document.getElementById('title-accent').style.color = accent();
}

function renderSummary() {
  if (stepIndex === 0) return;
  const b = base();
  const color = COLORS.find(c => c.id === sel.color);
  const ac = ASTRO_COLORS.find(c => c.id === sel.astro_color);
  const ff = FF_COLORS.find(f => f.id === sel.forcefield);
  let items = [];
  if (b) items.push({k:'COTTAGE', v:b.name});
  if (color) items.push({k:'COLOR', v:color.label});
  if (ac) items.push({k:'HULL', v:ac.label});
  const inner = items.map(i => `<div class="sum-item"><span class="sum-key">${i.k}</span><span class="sum-val">${i.v}</span></div>`).join('');
  const swatchHex = color?.hex || ac?.hex;
  const swatchHtml = swatchHex ? `<div class="color-swatch" style="background:${swatchHex};border:1px solid #333"></div>` : '';
  if (items.length) {
    const existing = document.getElementById('summary-bar');
    const html = `<div class="summary-bar" id="summary-bar">${inner}${swatchHtml}</div>`;
    if (existing) existing.outerHTML = html;
    else {
      const main = document.getElementById('main-content');
      main.insertAdjacentHTML('beforebegin', html);
    }
  }
}

function renderStep() {
  const s = currentStep();
  const meta = STEP_META[s];
  const ss = steps();
  const acc = accent();

  let stepHTML = '';
  if (meta) {
    stepHTML = `<div class="step-hdr">
      <div class="step-num" style="color:${acc}">STEP ${String(stepIndex+1).padStart(2,'0')} / ${String(ss.length).padStart(2,'0')}</div>
      <div class="step-title" style="color:${stepIndex===0?'#e8e8e0':acc}">${meta.title}</div>
      <div class="step-sub">${meta.sub}</div>
    </div>`;
  }

  let content = '';
  if (submitted) {
    content = renderSubmitted();
  } else {
    content = renderStepContent(s);
  }

  const navHTML = submitted ? renderNavSubmitted() : renderNav(s);

  document.getElementById('main-content').innerHTML = stepHTML + content + navHTML;
  attachHandlers(s);
}

function renderContainerDiagram() {
  const b = base();
  if (!b || !b.zones || !b.zones.length) return '';
  const total = b.zones.reduce((a,z) => a + parseFloat(z.len),0);
  const colorHex = COLORS.find(c => c.id === sel.color)?.hex || ASTRO_COLORS.find(c=>c.id===sel.astro_color)?.hex || '#4A5C3A';
  const zoneHTML = b.zones.map((z,i) => {
    const pct = (parseFloat(z.len)/total)*100;
    return `<div class="diag-zone" style="width:${pct}%;background:${z.color};border-right:${i<b.zones.length-1?'1px solid #000':'none'}">
      <div class="diag-zone-name" style="color:${acc}">${z.name.toUpperCase()}</div>
      <div class="diag-zone-len">${z.len}</div>
    </div>`;
  }).join('');
  const legHTML = b.zones.map((z,i) => `<div class="diag-leg-item"><div class="diag-leg-dot" style="background:${acc};opacity:.7"></div><span class="diag-leg-txt">Z${i+1} ${z.name.toUpperCase()}</span></div>`).join('');
  return `<div class="container-diag">
    <div class="diag-label">40FT HIGH CUBE · FLOOR PLAN</div>
    <div class="diag-bar" style="border:1px solid ${acc}22">
      <div class="diag-wall" style="background:${colorHex};border-right:1px solid #000"></div>
      ${zoneHTML}
      <div class="diag-wall" style="background:${colorHex};border-left:1px solid #000"></div>
    </div>
    <div class="diag-legend">${legHTML}</div>
  </div>`;
}

const acc_getter = () => accent();

function renderStepContent(s) {
  const acc = accent();
  switch(s) {
    case 'base': return renderOptionCards(BASES, 'base', 'grid2', acc, b => `
      <div class="card-dot"></div>
      <span class="card-icon">${b.icon}</span>
      <div class="card-name" style="color:${sel.base===b.id?b.accent:'#e8e8e0'}">${b.name}</div>
      <div class="card-sub">${b.tagline}</div>
      <div class="card-desc">${b.desc}</div>
      <div style="margin-top:14px;display:flex;gap:16px">
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#3a5a3a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:2px">OUTPUT</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b8d4b8">${b.output}</div></div>
        <div><div style="font-family:'IBM Plex Mono',monospace;font-size:9px;color:#3a5a3a;letter-spacing:.2em;text-transform:uppercase;margin-bottom:2px">SERVICE</div><div style="font-family:'IBM Plex Mono',monospace;font-size:11px;color:#b8d4b8">${b.service}</div></div>
      </div>
    `);

    case 'color': return renderContainerDiagram() + renderColorPicker(COLORS, 'color', acc);

    case 'power': return renderOptionCards(POWER_OPTS, 'power', 'grid3', acc);
    case 'water': return renderOptionCards(WATER_OPTS, 'water', 'grid3', acc);
    case 'tier':  return renderOptionCards(TIER_OPTS,  'tier',  'grid3', acc);
    case 'offgrid': return renderOptionCards(OFFGRID_OPTS,'offgrid','grid2',acc);

    case 'astro_color': return renderAstroColorStep();
    case 'astro_atmosphere': return renderOptionCards(ASTRO_ATMOSPHERE,'astro_atmosphere','grid2','#9B6DFF');
    case 'astro_water':      return renderOptionCards(ASTRO_WATER,'astro_water','grid2','#9B6DFF');
    case 'astro_waste':      return renderOptionCards(ASTRO_WASTE,'astro_waste','grid2','#9B6DFF');
    case 'astro_tier':       return renderOptionCards(ASTRO_TIER,'astro_tier','grid2','#9B6DFF');
    case 'astro_comms':      return renderOptionCards(ASTRO_COMMS,'astro_comms','grid2','#9B6DFF');
    case 'astro_emergency':  return renderOptionCards(ASTRO_EMERGENCY,'astro_emergency','grid2','#9B6DFF');
    case 'astro_crown': return renderCrownStep();
    case 'lead': return renderLead();
    default: return '';
  }
}

function renderOptionCards(opts, key, gridClass, acc, customInner) {
  return `<div class="${gridClass}">` + opts.map(opt => {
    const selected = sel[key] === opt.id;
    const isEgg = !!opt.isEasterEgg;
    const cardAcc = isEgg ? '#FF4444' : acc;
    const inner = customInner ? customInner(opt) : `
      <div class="card-dot"></div>
      <span class="card-icon">${opt.icon||''}</span>
      ${opt.tag ? `<div class="card-tag" style="color:${opt.tagColor||'#888'};border-color:${opt.tagColor||'#888'}">${opt.tag}</div>` : ''}
      <div class="card-name" style="color:${selected?(isEgg?'#FF4444':acc):'#e8e8e0'}">${opt.label}</div>
      ${opt.desc ? `<div class="card-desc">${opt.desc}</div>` : ''}
      ${opt.price ? `<div class="card-price" style="color:${isEgg?'#FF4444':acc}">${opt.price}</div>` : ''}
    `;
    return `<div class="card${selected?' selected':''}${isEgg?' easter':''}" data-key="${key}" data-val="${opt.id}"
      style="background:${selected?`rgba(${hexToRgb(cardAcc)},.08)`:(isEgg?'#1a0a0a':'#0f140f')};border-color:${selected?cardAcc:(isEgg?'#FF444433':'#1e2a1e')}">
      ${inner}</div>`;
  }).join('') + '</div>';
}

function renderColorPicker(colors, key, acc) {
  return `<div class="grid6c">` + colors.map(c => {
    const sel_c = sel[key] === c.id;
    return `<div class="color-item" data-key="${key}" data-val="${c.id}" style="cursor:pointer">
      <div class="swatch${sel_c?' selected':''}" style="background:${c.hex};border:${c.hex==='#F0EDE8'?'1px solid #333':'1px solid transparent'};border-radius:3px;aspect-ratio:1;${sel_c?`box-shadow:0 0 0 2px #0a0c0a,0 0 0 4px ${acc}`:`box-shadow:0 2px 8px ${c.shadow}40`};transform:${sel_c?'scale(1.05)':'scale(1)'};transition:all .2s"></div>
      <div class="color-name">${c.label.split(' ')[0].toUpperCase()}</div>
    </div>`;
  }).join('') + '</div>';
}

  const acc = accent();
  return `<div class="submitted-wrap">
    <div class="submitted-title" style="color:${acc}">${isAstro()?'LUNAR BUILD REQUEST TRANSMITTED':'SPEC REQUEST SENT'}</div>
    <div class="submitted-sub" style="color:#4a6a4a;letter-spacing:.15em">${isAstro()?'SIGNAL TRAVELING AT LIGHT SPEED · ETA 1.3 SECONDS':'YOUR BUILD PLAN IS BEING PREPARED'}</div>
    <div class="spec-box">
      <div class="spec-title" style="color:${acc}">BUILD SUMMARY · ${b?.name}</div>
      <div class="spec-row"><span class="spec-key">NAME</span><span class="spec-val">${sel.leadFirst} ${sel.leadLast}</span></div>
      <div class="spec-row"><span class="spec-key">EMAIL</span><span class="spec-val">${sel.leadEmail}</span></div>
      <div class="spec-row"><span class="spec-key">COTTAGE</span><span class="spec-val">${b?.name}</span></div>
      ${genXDiscount?`<div class="spec-row"><span class="spec-key">DISCOUNT</span><span class="spec-val" style="color:#FF4444">10% GEN X DISCOUNT 😤</span></div>`:''}
      <div style="margin-top:16px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#3a5a3a;letter-spacing:.15em">GRUSH INTEGRATED · CONFIDENTIAL · FOR LICENSED USE ONLY</div>
    </div>
  </div>`;
}

function renderNav(s) {
  const canGo = canAdvance(s);
  const acc = accent();
  const isSkippable = s === 'offgrid';
  return `<div class="nav-row">
    ${stepIndex > 0 ? `<button class="btn-secondary" onclick="goBack()">← BACK</button>` : ''}
    <button class="btn-primary" ${!canGo?'disabled':''} onclick="advance()" style="background:${acc};color:#0a0c0a">${s==='lead'?'SUBMIT REQUEST →':'CONTINUE →'}</button>
    ${isSkippable ? `<button class="btn-skip" onclick="advance()">skip · use default</button>` : ''}
    ${stepIndex > 0 && !isSkippable ? `<button class="btn-skip" onclick="restart()">start over</button>` : ''}
  </div>`;
}

function renderNavSubmitted() {
  return `<div class="nav-row"><button class="btn-secondary" onclick="restart()">CONFIGURE ANOTHER</button></div>`;
}

// ─── ADVANCE / BACK ──────────────────────────────────────────────────────────
function canAdvance(s) {
  const map = {
    base:sel.base, color:sel.color, astro_color:sel.astro_color, power:sel.power,
    water:sel.water, tier:sel.tier, offgrid:sel.offgrid,
    astro_atmosphere:sel.astro_atmosphere, astro_water:sel.astro_water,
    astro_waste:sel.astro_waste, astro_tier:sel.astro_tier,
    astro_comms:sel.astro_comms, astro_emergency:sel.astro_emergency,
    astro_crown:sel.crown, lead:sel.leadEmail,
  };
  return !!map[s];
}

function advance() {
  const s = currentStep();
  if (s === 'lead') { submitted = true; render(); return; }

  // Gen X check on egg steps
  if (!genXTriggered && ['astro_tier','astro_comms','astro_emergency'].includes(s)) {
    if (countEasterEggs() >= 2) {
      genXTriggered = true; genXDiscount = true;
      triggerGenX(); return;
    }
  }

  if (stepIndex < steps().length - 1) { stepIndex++; render(); }
}

function goBack() {
  if (stepIndex > 0) { stepIndex--; render(); }
}

function restart() {
  sel = {base:null,color:null,astro_color:null,forcefield:'none',power:null,water:null,tier:null,offgrid:null,astro_atmosphere:null,astro_water:null,astro_waste:null,astro_tier:null,astro_comms:null,astro_emergency:null,crown:null,crown_items:[],leadFirst:'',leadLast:'',leadEmail:'',leadPhone:'',leadNotes:''};
  stepIndex = 0; submitted = false; genXTriggered = false; genXDiscount = false;
  document.getElementById('main-content').innerHTML = '';
  const sb = document.getElementById('summary-bar'); if (sb) sb.remove();
  render();
}

function triggerGenX() {
  const el = document.getElementById('genx-flash');
  el.style.display = 'flex';
  let count = 0;
  const interval = setInterval(() => {
    el.style.background = count % 2 === 0 ? '#CC0000' : '#0a0c0a';
    count++;
    if (count >= 12) {
      clearInterval(interval);
      el.style.background = '#CC0000';
      setTimeout(() => { el.style.display='none'; stepIndex++; render(); }, 1800);
    }
  }, 160);
}

// ─── EVENT DELEGATION ────────────────────────────────────────────────────────
function attachHandlers(s) {
  document.getElementById('main-content').addEventListener('click', function(e) {
    const card = e.target.closest('[data-key]');
    if (card) {
      sel[card.dataset.key] = card.dataset.val;
      // auto-advance single-choice steps
      if (!['base','lead','astro_crown'].includes(s)) {
        setTimeout(() => { if (canAdvance(s)) advance(); else render(); }, 180);
      } else { render(); }
      return;
    }
    const colorItem = e.target.closest('.color-item[data-key]');
    if (colorItem) {
      sel[colorItem.dataset.key] = colorItem.dataset.val;
      render(); return;
    }
    const crownItem = e.target.closest('[data-crown-item]');
    if (crownItem) {
      const id = crownItem.dataset.crownItem;
      const idx = (sel.crown_items||[]).indexOf(id);
      if (idx >= 0) sel.crown_items.splice(idx,1);
      else { sel.crown_items = sel.crown_items||[]; sel.crown_items.push(id); }
      render(); return;
    }
  });
  // form inputs
  ['f-first','f-last','f-email','f-phone','f-notes'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.addEventListener('input', function() {
      const map = {'f-first':'leadFirst','f-last':'leadLast','f-email':'leadEmail','f-phone':'leadPhone','f-notes':'leadNotes'};
      sel[map[id]] = this.value;
      // re-enable button without full render
      const btn = document.querySelector('.btn-primary');
      if (btn) btn.disabled = !canAdvance('lead');
    });
  });
}

// ─── INIT ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
