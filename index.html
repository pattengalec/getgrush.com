<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grush Cottages — GC-DPS</title>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --navy:      #050a18;
  --cyan:      #00c8ff;
  --chart:     #c8ff00;
  --amber:     #ffb830;
  --steel:     #8aaab8;
  --dim:       #3a5060;
  --dimmer:    #1e2e38;
  --white:     #eef2f4;
  --card-bg:   rgba(0,0,0,0.52);
  --card-bdr:  rgba(255,255,255,0.08);
}

/* ---- LAYER 2: EXPLORE BUTTON + DETAIL OVERLAY ---- */
.card-explore {
  display:block; width:100%; margin:0 0 0.6rem 0; padding:0.7rem 1rem;
  background:transparent; border:1px solid rgba(255,255,255,0.18); border-radius:6px;
  color:var(--white); font:inherit; font-size:13px; letter-spacing:0.04em; cursor:pointer;
  transition:background .2s,border-color .2s;
}
.card-dps  .card-explore:hover { background:rgba(0,200,255,0.14); border-color:rgba(0,200,255,0.5); color:var(--cyan); }
.card-cott .card-explore:hover { background:rgba(255,184,48,0.12); border-color:rgba(255,184,48,0.5); color:var(--amber); }

#detail-overlay {
  position:fixed; inset:0; z-index:60; background:rgba(5,10,24,0.97);
  opacity:0; pointer-events:none; transition:opacity .4s ease; overflow-y:auto;
  backdrop-filter:blur(2px);
}
#detail-overlay.show { opacity:1; pointer-events:auto; }
.detail-inner { max-width:780px; margin:0 auto; padding:64px 28px 96px; }
#detail-close {
  position:fixed; top:20px; right:24px; z-index:62; width:42px; height:42px;
  border-radius:50%; border:1px solid rgba(255,255,255,0.2); background:rgba(0,0,0,0.4);
  color:var(--steel); font-size:22px; line-height:1; cursor:pointer; transition:.2s;
}
#detail-close:hover { color:var(--white); border-color:rgba(255,255,255,0.5); }
.detail-eyebrow { font-size:11px; letter-spacing:0.18em; text-transform:uppercase; margin-bottom:0.5rem; }
.detail-title { font-size:clamp(26px,5vw,40px); font-weight:700; color:var(--white); line-height:1.1; margin-bottom:1.4rem; }
.detail-lead { font-size:15px; line-height:1.7; color:var(--steel); margin-bottom:2.2rem; max-width:640px; }
/* picker tabs */
.cott-tabs { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:1.8rem; }
.cott-tab {
  padding:0.5rem 0.95rem; border:1px solid rgba(255,184,48,0.3); border-radius:20px;
  background:transparent; color:var(--steel); font:inherit; font-size:12.5px; cursor:pointer; transition:.2s;
}
.cott-tab:hover { color:var(--white); }
.cott-tab.active { background:rgba(255,184,48,0.16); border-color:var(--amber); color:var(--amber); }
.dps-tab.active { background:rgba(0,200,255,0.16); border-color:var(--cyan); color:var(--cyan); }
.dps-tab { border-color:rgba(0,200,255,0.3); }
/* detail body */
.detail-section { animation:detailFade .4s ease; }
@keyframes detailFade { from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:none;} }
.detail-h { font-size:20px; font-weight:600; color:var(--white); margin:0 0 0.4rem; }
.detail-sub { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; margin-bottom:1rem; }
.detail-p { font-size:14px; line-height:1.7; color:var(--steel); margin-bottom:1.6rem; max-width:620px; }
.detail-specs { display:grid; grid-template-columns:1fr 1fr; gap:0; margin:1.4rem 0 2rem; border-top:1px solid rgba(255,255,255,0.08); }
.detail-spec { display:flex; justify-content:space-between; gap:10px; padding:9px 2px; border-bottom:1px solid rgba(255,255,255,0.07); font-size:12.5px; }
.detail-spec .l { color:var(--dim); }
.detail-spec .v { color:#a8bec8; text-align:right; }
.detail-svg { width:100%; max-width:620px; margin:0.5rem 0 2rem; border:1px solid rgba(255,255,255,0.07); border-radius:8px; background:rgba(0,0,0,0.25); }
@media(max-width:560px){ .detail-specs{grid-template-columns:1fr;} }


html, body {
  height: 100%;
  background: var(--navy);
  color: var(--white);
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overflow: hidden;
}

/* ---- STAGE ---- */
#stage {
  width: 100vw;
  height: 100vh;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Option-3 dimensional lift — subtle radial glow behind content so the
   page reads as dark-but-dimensional rather than flat black. Sits above
   the per-scene bg color but below content and the 3D canvases. */
#stage::before {
  content: '';
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 50% 38%, rgba(40,64,96,0.30) 0%, rgba(20,34,56,0.12) 45%, rgba(0,0,0,0) 75%),
    radial-gradient(ellipse 120% 80% at 50% 120%, rgba(34,46,72,0.22) 0%, rgba(0,0,0,0) 60%);
}

/* ---- 3D CANVAS ---- */
#three-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  z-index: 1;
  opacity: 0;
  transition: opacity 1.4s ease;
  pointer-events: none;
}
#three-canvas.visible { opacity: 1; }
#three-canvas.clickable { pointer-events: auto; cursor: pointer; }
#three-canvas canvas { width: 100% !important; height: 100% !important; }

/* ---- CONTENT PANEL ---- */
#content-wrap {
  position: relative;
  z-index: 2;
  text-align: center;
  max-width: 820px;
  width: 90vw;
  padding: 2.5rem 3rem;
  transition: all 0.6s ease;
}
#content-wrap.overlay-mode {
  position: fixed;
  bottom: 110px;
  top: auto;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(5,10,24,0.82);
  border: 0.5px solid var(--card-bdr);
  border-radius: 10px;
  padding: 1.6rem 2.2rem;
  max-width: 620px;
  width: 90vw;
  backdrop-filter: blur(6px);
}

/* ---- TYPOGRAPHY ---- */
.eyebrow {
  font-size: 11px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--cyan);
  margin-bottom: 1rem;
  opacity: 0;
  transition: opacity 0.6s ease;
}
.accent-line {
  width: 32px;
  height: 1.5px;
  background: var(--cyan);
  margin: 0 auto 1.1rem;
  opacity: 0;
  transition: opacity 0.6s ease 0.08s;
}
.headline {
  font-size: clamp(30px, 5.5vw, 58px);
  font-weight: 300;
  line-height: 1.15;
  color: var(--white);
  margin-bottom: 1.2rem;
  opacity: 0;
  transition: opacity 0.6s ease 0.16s;
  letter-spacing: -0.03em;
}
.headline strong {
  font-weight: 600;
  color: var(--cyan);
}
.body-text {
  font-size: clamp(15px, 1.8vw, 18px);
  line-height: 1.75;
  color: var(--steel);
  opacity: 0;
  transition: opacity 0.6s ease 0.28s;
  max-width: 580px;
  margin: 0 auto;
}

/* ---- COST CALLOUT (scene 2b) ---- */
.cost-row {
  display: flex;
  align-items: flex-start;
  gap: 14px;
  padding: 0.65rem 0.9rem;
  margin: 6px 0;
  background: var(--card-bg);
  border: 0.5px solid var(--card-bdr);
  border-radius: 6px;
  text-align: left;
  opacity: 0;
  transition: opacity 0.55s ease;
}
.cost-row-icon {
  font-size: 18px;
  line-height: 1.3;
  flex-shrink: 0;
}
.cost-row-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--amber);
  margin-bottom: 2px;
}
.cost-row-text {
  font-size: 12px;
  color: var(--steel);
  line-height: 1.5;
}
.cost-rows-wrap { margin-top: 1.1rem; }

/* ---- ZONE LIST (scene 4) ---- */
.zones-wrap { margin-top: 1rem; width: 100%; text-align: left; }
.dps-zone {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  border-left: 2px solid var(--cyan);
  padding: 0.5rem 0.85rem;
  margin: 5px 0;
  background: var(--card-bg);
  border-radius: 0 5px 5px 0;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.5s ease, background 0.2s ease;
}
.dps-zone:hover { background: rgba(0,200,255,0.07); }
.dps-zone-name { font-size: 11px; font-weight: 600; color: var(--cyan); margin-bottom: 2px; letter-spacing: 0.06em; }
.dps-zone-text { font-size: 11px; color: var(--steel); line-height: 1.45; }

/* ---- SPEC GRID (scene 6) ---- */
.spec-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 7px;
  margin-top: 1.1rem;
  text-align: left;
  opacity: 0;
  transition: opacity 0.6s ease 0.28s;
}
.spec-card {
  background: var(--card-bg);
  border: 0.5px solid var(--card-bdr);
  border-radius: 6px;
  padding: 0.55rem 0.8rem;
}
.spec-label { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--dim); margin-bottom: 3px; }
.spec-val { font-size: 12.5px; color: #b8ccd6; font-weight: 500; }

/* ---- PATENT BADGE ---- */
.patent-badge {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  margin-top: 1rem;
  padding: 5px 12px;
  border: 0.5px solid rgba(200,255,0,0.3);
  border-radius: 4px;
  background: rgba(200,255,0,0.06);
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--chart);
  opacity: 0;
  transition: opacity 0.6s ease 0.4s;
}

/* ---- TWO-CARD SPLIT (scene 7) ---- */
#cards-wrap {
  position: relative;
  z-index: 2;
  display: flex;
  gap: 24px;
  padding: 2rem;
  width: 100vw;
  max-width: 960px;
  margin: 0 auto;
  align-items: stretch;
}
.grush-card {
  flex: 1;
  background: rgba(0,0,0,0.55);
  border: 0.5px solid rgba(255,255,255,0.1);
  border-radius: 12px;
  padding: 2.2rem 2rem 1.8rem;
  display: flex;
  flex-direction: column;
  opacity: 0;
  transform: translateY(16px);
  transition: opacity 0.6s ease, transform 0.6s ease, border-color 0.25s ease, background 0.25s ease;
  text-align: left;
}
.grush-card.show {
  opacity: 1;
  transform: translateY(0);
}
.grush-card:hover {
  background: rgba(0,0,0,0.72);
  border-color: rgba(0,200,255,0.25);
}
.grush-card.card-dps  { transition-delay: 0.1s; border-top: 2px solid var(--cyan); }
.grush-card.card-cott { transition-delay: 0.22s; border-top: 2px solid var(--amber); }
.card-eyebrow {
  font-size: 9.5px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 0.7rem;
}
.card-dps  .card-eyebrow { color: var(--cyan); }
.card-cott .card-eyebrow { color: var(--amber); }
.card-headline {
  font-size: clamp(18px, 2.2vw, 26px);
  font-weight: 300;
  color: var(--white);
  line-height: 1.2;
  letter-spacing: -0.02em;
  margin-bottom: 0.9rem;
}
.card-body {
  font-size: 13px;
  line-height: 1.7;
  color: var(--steel);
  flex: 1;
  margin-bottom: 1.4rem;
}
.card-specs {
  margin-bottom: 1.4rem;
}
.card-spec-row {
  display: flex;
  justify-content: space-between;
  padding: 5px 0;
  border-top: 0.5px solid rgba(255,255,255,0.06);
  font-size: 10.5px;
}
.card-spec-label { color: var(--dim); }
.card-spec-val   { color: #a8bec8; text-align: right; }
.card-cta {
  display: inline-block;
  padding: 8px 20px;
  border-radius: 6px;
  font-size: 11px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  text-decoration: none;
  margin-bottom: 1.2rem;
  transition: background 0.2s ease;
  cursor: pointer;
  text-align: center;
}
.card-dps  .card-cta { background: rgba(0,200,255,0.12); border: 1px solid rgba(0,200,255,0.4); color: var(--cyan); }
.card-cott .card-cta { background: rgba(255,184,48,0.1);  border: 1px solid rgba(255,184,48,0.4); color: var(--amber); }
.card-dps  .card-cta:hover { background: rgba(0,200,255,0.24); }
.card-cott .card-cta:hover { background: rgba(255,184,48,0.22); }
.card-contact {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 0.06em;
  border-top: 0.5px solid rgba(255,255,255,0.06);
  padding-top: 0.9rem;
  margin-top: auto;
}
.card-contact a {
  color: var(--dim);
  text-decoration: none;
}
.card-contact a:hover { color: var(--steel); }

/* ---- SHOW CLASS ---- */
.show { opacity: 1 !important; }

/* ---- CAPTION BAR ---- */
#caption-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  padding: 2.5rem 2rem 1rem;
  background: linear-gradient(transparent, rgba(5,10,24,0.88));
  pointer-events: none;
  z-index: 10;
}
#caption-text {
  font-size: 12.5px;
  color: var(--dim);
  line-height: 1.6;
  text-align: center;
  max-width: 580px;
  margin: 0 auto;
  min-height: 36px;
  transition: opacity 0.4s ease;
}

/* ---- TOP BAR ---- */
#brand {
  position: fixed;
  top: 1.2rem; left: 1.5rem;
  z-index: 20;
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--dimmer);
}
#model-label {
  position: fixed;
  top: 1.2rem; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--dim);
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
  white-space: nowrap;
}

/* ---- NAV UI ---- */
#ui {
  position: fixed;
  top: 1.1rem; right: 1.4rem;
  z-index: 20;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ui-btn {
  background: rgba(255,255,255,0.06);
  border: 0.5px solid rgba(255,255,255,0.15);
  color: #aaa;
  border-radius: 5px;
  padding: 5px 14px;
  font-size: 11.5px;
  cursor: pointer;
  letter-spacing: 0.04em;
  transition: background 0.2s, color 0.2s;
}
.ui-btn:hover { background: rgba(255,255,255,0.12); color: #fff; }
.ui-btn.primary {
  border-color: rgba(0,200,255,0.35);
  color: var(--cyan);
}
.ui-btn.primary:hover { background: rgba(0,200,255,0.1); }
#prog-wrap { width: 120px; height: 1.5px; background: var(--dimmer); border-radius: 2px; overflow: hidden; }
#prog-bar { height: 100%; background: var(--cyan); width: 0%; transition: width 0.3s linear; }
#scene-num { font-size: 10px; color: var(--dim); min-width: 36px; }

/* ---- NAV BUTTONS (prev / next) ---- */
#nav-prev, #nav-next {
  position: fixed;
  bottom: 68px;
  z-index: 20;
  background: rgba(0,200,255,0.13);
  border: 1px solid rgba(0,200,255,0.55);
  color: var(--cyan);
  border-radius: 7px;
  padding: 10px 32px;
  font-size: 13px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s ease, opacity 0.3s ease, border-color 0.2s ease;
}
#nav-prev { left: 50%; transform: translateX(calc(-50% - 90px)); }
#nav-next { left: 50%; transform: translateX(calc(-50% + 90px)); }
#nav-prev:hover, #nav-next:hover { background: rgba(0,200,255,0.26); border-color: rgba(0,200,255,0.85); }
#nav-prev.hidden { opacity: 0; pointer-events: none; }

/* ---- ZONE CLICK HINT ---- */
#zone-hint {
  position: fixed;
  bottom: 110px; left: 50%;
  transform: translateX(-50%);
  z-index: 20;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: var(--dim);
  opacity: 0;
  transition: opacity 0.8s ease;
  pointer-events: none;
  text-align: center;
  white-space: nowrap;
}
#zone-hint.show { opacity: 0.8; }

/* ---- ZONE DETAIL PANEL ---- */
#zone-detail {
  position: fixed;
  top: 50%; right: 1.4rem;
  transform: translateY(-50%) translateX(20px);
  z-index: 25;
  width: 270px;
  background: rgba(5,10,24,0.94);
  border: 0.5px solid rgba(0,200,255,0.2);
  border-radius: 8px;
  padding: 1.1rem 1.2rem;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s ease, transform 0.3s ease;
  backdrop-filter: blur(8px);
}
#zone-detail.show {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(-50%) translateX(0);
}
#zone-detail-eyebrow { font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase; color: var(--cyan); margin-bottom: 0.5rem; }
#zone-detail-title { font-size: 14px; color: var(--white); font-weight: 500; margin-bottom: 0.65rem; }
#zone-detail-body { font-size: 11px; line-height: 1.62; color: var(--steel); margin-bottom: 0.85rem; }
.zone-detail-spec { display: flex; justify-content: space-between; gap: 8px; padding: 4px 0; border-top: 0.5px solid rgba(255,255,255,0.06); font-size: 10.5px; }
.zone-detail-spec-label { color: var(--dim); }
.zone-detail-spec-val { color: #a8bec8; text-align: right; }
#zone-detail-close {
  position: absolute; top: 0.65rem; right: 0.75rem;
  background: none; border: none; color: var(--dim);
  font-size: 16px; cursor: pointer; line-height: 1; padding: 4px;
}
#zone-detail-close:hover { color: var(--steel); }

/* ---- VOL ---- */
#vol-wrap {
  position: fixed;
  bottom: 1.1rem; right: 1.4rem;
  z-index: 20;
  display: flex; align-items: center; gap: 6px;
  opacity: 0.3;
  transition: opacity 0.2s;
}
#vol-wrap:hover { opacity: 1; }
#vol-wrap label { font-size: 9px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; }
#vol { width: 55px; accent-color: var(--cyan); }

/* ===== INTRO SPLASH + POWER-ON GATE (injected) ===== */

#gate, #splash {

  --sp-navy:#0a1531;          /* lifted ~30% from #050a18 for the splash background */
  --cyan:#00c8ff;
  --chart:#c8ff00;
  --amber:#ffb830;
  --white:#eef2f4;

  /* live tile colors */
  --grow:#2f7d52;     /* plant — green */
  --myc:#7f97a3;      /* mushroom — sage/steel */
  --shop:#e8702a;     /* hammer — orange */
  --office:#27485c;   /* computer — navy/blue */

  /* dead (de-energized) — distinctly darker/flatter so dead->alive POPS */
  --dead:#131a24;
  --dead-bdr:#171f28;
  --dead-icon:#2e3846;

}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }





#splash{
  position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
  background:var(--sp-navy); z-index:25;
}
/* dimensional lift to match the site */
#splash::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:
    radial-gradient(ellipse 70% 55% at 50% 44%, rgba(60,90,130,0.45) 0%, rgba(30,48,78,0.18) 48%, rgba(0,0,0,0) 76%);
}

/* stage holds the assembling logo, centered */
#logo-stage{
  position:relative; width:340px; height:430px;
  display:flex; align-items:center; justify-content:center;
}

/* the 2x2 grid target */
#grid{
  position:relative; width:300px; height:300px;
}

/* each tile */
.tile{
  position:absolute; width:140px; height:140px;
  display:flex; align-items:center; justify-content:center;
  /* octagon */
  clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%);
  background:var(--dead);
  border:0; /* color via bg */
  /* start state set by JS via transform */
  opacity:0;
  transition:none;
  will-change:transform,opacity;
}
.tile .ring{ /* inner ring to read as the octagon outline */
  position:absolute; inset:0;
  clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%);
  box-shadow:inset 0 0 0 3px var(--dead-bdr);
  transition:box-shadow .45s ease;
}
.tile svg{ width:74px; height:74px; position:relative; z-index:2; display:block; }
.tile .icon-path{ fill:var(--dead-icon); transition:fill .5s ease; }

/* tile glow layer (cyan energization halo) */
.tile .glow{
  position:absolute; inset:-6px;
  clip-path:polygon(30% 0,70% 0,100% 30%,100% 70%,70% 100%,30% 100%,0 70%,0 30%);
  opacity:0; background:radial-gradient(circle at 50% 50%, rgba(0,200,255,0.55), rgba(0,200,255,0) 68%);
  transition:opacity .5s ease;
}

/* grid placement */
#tile-grow  { top:0;   left:0;   }   /* TL */
#tile-myc   { top:0;   left:160px; } /* TR */
#tile-office{ top:160px; left:0;   } /* BL */
#tile-shop  { top:160px; left:160px; } /* BR */

/* LIVE state — color floods in */
.tile.live#tile-grow   { background:var(--grow); }
.tile.live#tile-myc    { background:var(--myc); }
.tile.live#tile-office { background:var(--office); }
.tile.live#tile-shop   { background:var(--shop); }
.tile.live .ring       { box-shadow:inset 0 0 0 3px rgba(255,255,255,0.18); }
.tile.live .icon-path  { fill:#f4f8fa; }
.tile.live .glow       { opacity:1; }
.tile.lit .glow        { opacity:1; }

/* cyan core (the Grush energy) */
#core{
  position:absolute; top:150px; left:50%; transform:translate(-50%,-50%) scale(0);
  width:60px; height:60px; border-radius:50%;
  background:radial-gradient(circle, rgba(180,240,255,1) 0%, rgba(0,200,255,0.9) 30%, rgba(0,200,255,0) 70%);
  opacity:0; z-index:5; pointer-events:none;
  filter:blur(1px);
}

/* shockwave ring from center seam */
#shock{
  position:absolute; top:150px; left:150px; transform:translate(-50%,-50%) scale(0.2);
  width:300px; height:300px; border-radius:50%;
  border:2px solid rgba(0,200,255,0.9);
  opacity:0; z-index:4; pointer-events:none;
}

/* seam cross-pulse */
#seam-v,#seam-h{
  position:absolute; background:var(--cyan); opacity:0; z-index:3;
  box-shadow:0 0 12px 2px rgba(0,200,255,0.8);
}
#seam-v{ top:0; left:149px; width:2px; height:300px; }
#seam-h{ top:149px; left:0; width:300px; height:2px; }

/* wordmark */
#wordmark{
  position:absolute; bottom:-6px; left:50%; transform:translateX(-50%) translateY(14px);
  text-align:center; opacity:0; transition:opacity .7s ease, transform .7s ease;
  white-space:nowrap;
}
#wordmark .wm-main{ font-size:34px; font-weight:800; letter-spacing:0.08em; color:var(--white); }
#wordmark .wm-sub{ font-size:13px; letter-spacing:0.04em; color:var(--myc); margin-top:2px; }
#wordmark .wm-sub b{ color:var(--cyan); font-weight:700; }
#wordmark.show{ opacity:1; transform:translateX(-50%) translateY(0); }

/* skip control */
#skip{
  position:fixed; bottom:22px; right:24px; z-index:20;
  font-size:11px; letter-spacing:0.14em; text-transform:uppercase; color:#4a5a6a;
  background:rgba(255,255,255,0.05); border:0.5px solid rgba(255,255,255,0.12);
  border-radius:5px; padding:7px 16px; cursor:pointer; transition:.2s;
}
#skip:hover{ color:var(--white); border-color:rgba(255,255,255,0.4); }

/* replay (prototype only) */
#replay{
  position:fixed; bottom:22px; left:24px; z-index:20;
  font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--cyan);
  background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.4);
  border-radius:5px; padding:7px 16px; cursor:pointer;
}


#splash.gone{ opacity:0; pointer-events:none; transition:opacity .7s ease; }

/* ---- POWER-ON GATE (title page / audio unlock) ---- */
#gate{
  position:fixed; inset:0; z-index:30; display:flex; flex-direction:column;
  align-items:center; justify-content:center; text-align:center;
  background:var(--sp-navy);
  transition:opacity .6s ease;
}
#gate::before{
  content:''; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(ellipse 70% 55% at 50% 46%, rgba(60,90,130,0.40) 0%, rgba(30,48,78,0.15) 48%, rgba(0,0,0,0) 76%);
}
#gate.gone{ opacity:0; pointer-events:none; }
#gate .gate-brand{
  position:relative; z-index:2; font-size:13px; letter-spacing:0.34em; text-transform:uppercase;
  color:var(--myc); margin-bottom:2.4rem; font-weight:600;
}
#gate .gate-brand b{ color:var(--white); font-weight:700; }
#power-btn{
  position:relative; z-index:2; cursor:pointer;
  display:inline-flex; align-items:center; gap:12px;
  padding:16px 40px; border-radius:8px;
  background:rgba(0,200,255,0.08); border:1px solid rgba(0,200,255,0.45);
  color:var(--cyan); font-size:15px; letter-spacing:0.18em; text-transform:uppercase; font-weight:600;
  transition:background .25s ease, border-color .25s ease, box-shadow .25s ease, transform .15s ease;
}
#power-btn:hover{
  background:rgba(0,200,255,0.18); border-color:var(--cyan);
  box-shadow:0 0 30px rgba(0,200,255,0.25);
}
#power-btn:active{ transform:scale(0.97); }
#power-btn .pwr-icon{
  width:18px; height:18px; display:inline-block;
  border:2px solid var(--cyan); border-radius:50%; position:relative;
}
#power-btn .pwr-icon::after{
  content:''; position:absolute; top:-4px; left:50%; transform:translateX(-50%);
  width:2px; height:9px; background:var(--cyan);
}
#gate .gate-hint{
  position:relative; z-index:2; margin-top:2rem; font-size:10.5px; letter-spacing:0.14em;
  text-transform:uppercase; color:#3a4a5a;
}
/* subtle breathing pulse on the button to invite the click */
@keyframes pwrPulse{ 0%,100%{ box-shadow:0 0 0 rgba(0,200,255,0); } 50%{ box-shadow:0 0 22px rgba(0,200,255,0.18); } }
#power-btn{ animation:pwrPulse 2.6s ease-in-out infinite; }

function initAudio() {
  if (ctx) return;
  ctx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = ctx.createGain();
  masterGain.gain.setValueAtTime(masterVol * 0.20, ctx.currentTime);
  masterGain.connect(ctx.destination);

  droneOsc = ctx.createOscillator(); droneOsc.type = 'sine'; droneOsc.frequency.setValueAtTime(55, ctx.currentTime);

  droneOsc.connect(droneGain); droneGain.connect(masterGain); droneOsc.start();

  droneOsc2 = ctx.createOscillator(); droneOsc2.type = 'sine'; droneOsc2.frequency.setValueAtTime(110.05, ctx.currentTime);
  droneGain2 = ctx.createGain(); droneGain2.gain.setValueAtTime(0, ctx.currentTime);
  droneOsc2.connect(droneGain2); droneGain2.connect(masterGain); droneOsc2.start();

  lfoOsc = ctx.createOscillator(); lfoOsc.type = 'sine'; lfoOsc.frequency.setValueAtTime(0.08, ctx.currentTime);
  var lfoG = ctx.createGain(); lfoG.gain.setValueAtTime(3, ctx.currentTime);
  lfoOsc.connect(lfoG); lfoG.connect(droneOsc.frequency); lfoOsc.start();
}

function fadeDroneTo(freq) {
  if (!ctx) return;
  var t = ctx.currentTime;
  droneOsc.frequency.cancelScheduledValues(t); droneOsc.frequency.setValueAtTime(droneOsc.frequency.value, t); droneOsc.frequency.linearRampToValueAtTime(freq, t+2);
  droneOsc2.frequency.cancelScheduledValues(t); droneOsc2.frequency.setValueAtTime(droneOsc2.frequency.value, t); droneOsc2.frequency.linearRampToValueAtTime(freq*2.005, t+2);
  droneGain.gain.cancelScheduledValues(t); droneGain.gain.setValueAtTime(droneGain.gain.value, t); droneGain.gain.linearRampToValueAtTime(0.4, t+1.5);
  droneGain2.gain.cancelScheduledValues(t); droneGain2.gain.setValueAtTime(droneGain2.gain.value, t); droneGain2.gain.linearRampToValueAtTime(0.2, t+1.5);
}

// Haptic feedback — short crisp tap on mobile
function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern || [18]);
}

// connectorSnap — mechanical connector engaging: thud + click + noise burst, no tail
function connectorSnap(loud) {
  haptic(loud ? [22] : [14]);
  if (!ctx) return;
  var t = ctx.currentTime;
  var vol = loud ? 1.0 : 0.7;

  // 1. Impact thud — low sine, fast attack, very fast decay (the "body" of the snap)
  var thud = ctx.createOscillator(); var thudG = ctx.createGain();
  thud.type = 'sine';
  thud.frequency.setValueAtTime(120, t);
  thud.frequency.exponentialRampToValueAtTime(55, t + 0.03);
  thudG.gain.setValueAtTime(0, t);
  thudG.gain.linearRampToValueAtTime(1.4 * vol, t + 0.003);
  thudG.gain.exponentialRampToValueAtTime(0.0008, t + 0.045);
  thud.connect(thudG); thudG.connect(masterGain);
  thud.start(t); thud.stop(t + 0.05);

  // 2. Click transient — very short noise burst (the "snap" surface contact)
  var bufSize = Math.floor(ctx.sampleRate * 0.018);
  var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
  var data = buf.getChannelData(0);
  for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);
  var noise = ctx.createBufferSource(); noise.buffer = buf;
  // High-pass the noise so it reads as click, not rumble
  var hp = ctx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 3200; hp.Q.value = 0.8;
  var noiseG = ctx.createGain();
  noiseG.gain.setValueAtTime(1.1 * vol, t);
  noiseG.gain.exponentialRampToValueAtTime(0.0008, t + 0.018);
  noise.connect(hp); hp.connect(noiseG); noiseG.connect(masterGain);
  noise.start(t); noise.stop(t + 0.02);

  // 3. Metallic ring — short mid tone, gives it the "connector" character
  var ring = ctx.createOscillator(); var ringG = ctx.createGain();
  ring.type = 'square';
  ring.frequency.setValueAtTime(680, t + 0.002);
  ring.frequency.exponentialRampToValueAtTime(420, t + 0.025);
  ringG.gain.setValueAtTime(0, t + 0.002);
  ringG.gain.linearRampToValueAtTime(0.36 * vol, t + 0.005);
  ringG.gain.exponentialRampToValueAtTime(0.0008, t + 0.038);
  // Bandpass to keep it tight
  var bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 550; bp.Q.value = 1.2;
  ring.connect(bp); bp.connect(ringG); ringG.connect(masterGain);
  ring.start(t + 0.002); ring.stop(t + 0.04);
}

function navTick()   { connectorSnap(true);  }
function zoneClick() { connectorSnap(false); }

function setVolume(v) {
  masterVol = parseFloat(v);
  if (masterGain) masterGain.gain.setValueAtTime(masterVol*0.20, ctx.currentTime);
}

// THREE.JS — DPS MODEL (v013)
// ============================================================
var dpsReady = false;
var threeScene, threeCamera, threeRenderer;
var pinGroup, pocketGroup, dpsAssembly;
var gapCurrent = 0, gapTarget = 0;
var dampers = [], doorPivots = [];
var zoneRegistry = {};
var raycaster, mouseVec;
var clickEnabled = false;
var threeTheta = Math.PI*0.22, threePhi = Math.PI*0.38, threeRadius = 4200;
var threeTarget, flyTarget, flyRadius;
var dockingAnim = false, dockingDir = 0;

// Chaos model (scene 1/2 background)
var chaosReady = false;
var chaosScene, chaosCamera, chaosRenderer;
var chaosAssembly;
var chaosTheta = 0;

var FRAME_W=2200, FRAME_H=2500, FRAME_D=150;
var PASSAGE_W=711;
var PIN_D=50, PIN_PROTRUSION=120, PIN_CHAMFER=15;
var POCKET_D=51.5, POCKET_DEPTH=125;
var CONTAINER_L=12192, CONTAINER_W=2438, CONTAINER_H=2896;
var DOOR_OPEN_W=2340, DOOR_OPEN_H=2597;
var WALL_VIS=90, HEADER_H=600;
var CORNER_INSET_X=300, CORNER_INSET_Y=300;
var DUCT_D=305;
var offX=FRAME_W/2-CORNER_INSET_X, offY=FRAME_H/2-CORNER_INSET_Y;
var CHAMFER_H=(PIN_D/2)/Math.tan(PIN_CHAMFER*Math.PI/180);
var SEP_GAP=500;

function initDPS() {
  if (dpsReady) return;
  dpsReady = true;

  var M = {
    steel:     new THREE.MeshStandardMaterial({color:0x6b7280,roughness:0.6,metalness:0.3}),
    steelDk:   new THREE.MeshStandardMaterial({color:0x9a9484,roughness:0.7,metalness:0.15}),
    pin:       new THREE.MeshStandardMaterial({color:0x3a3f44,roughness:0.3,metalness:0.7}),
    pocket:    new THREE.MeshStandardMaterial({color:0x2a2e32,roughness:0.5,metalness:0.4}),
    door:      new THREE.MeshStandardMaterial({color:0xb8c4ce,roughness:0.5,metalness:0.2}),
    elec:      new THREE.MeshStandardMaterial({color:0xf2a33c,roughness:0.5,metalness:0.2}),
    data:      new THREE.MeshStandardMaterial({color:0x3dd6c7,roughness:0.4,metalness:0.2}),
    vent:      new THREE.MeshStandardMaterial({color:0x7fb3d5,roughness:0.4,metalness:0.3}),
    plumb:     new THREE.MeshStandardMaterial({color:0x4c7ebf,roughness:0.4,metalness:0.3}),
    container: new THREE.MeshStandardMaterial({color:0x8a7560,roughness:0.8,metalness:0.1,transparent:true,opacity:0.12,side:THREE.DoubleSide})
  };

  zoneRegistry = {structure:[],lock:[],electrical:[],data:[],ventilation:[],plumbing:[],container:[]};

  function addEdges(m) { m.add(new THREE.LineSegments(new THREE.EdgesGeometry(m.geometry), new THREE.LineBasicMaterial({color:0x1c1c1a,opacity:0.45,transparent:true}))); return m; }
  function mkbox(w,h,d,mat) { var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat.clone()); addEdges(m); return m; }
  function cyl(r,h,mat,s) { var m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,h,s||24),mat.clone()); addEdges(m); return m; }
  function connectPts(p1,p2,mat,r) {
    var dir=new THREE.Vector3().subVectors(p2,p1), len=dir.length();
    var m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,10),mat.clone()); addEdges(m);
    m.position.copy(p1).add(p2).multiplyScalar(0.5);
    m.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize()));
    return m;
  }
  function tag(m,z) { m.userData.zone=z; m.userData.baseOpacity=m.material.opacity!==undefined?m.material.opacity:1; zoneRegistry[z].push(m); return m; }

  function buildFrame(kind, zSign) {
    var g = new THREE.Group();
    var bm = kind==='pin' ? M.steelDk : M.steel;
    var bz = zSign*FRAME_D/2;
    function ap(m){g.add(m);return m;}

    var top=mkbox(FRAME_W,WALL_VIS,FRAME_D,bm); top.position.set(0,FRAME_H/2-WALL_VIS/2,bz); tag(top,'structure'); ap(top);
    var bot=mkbox(FRAME_W,WALL_VIS,FRAME_D,bm); bot.position.set(0,-FRAME_H/2+WALL_VIS/2,bz); tag(bot,'structure'); ap(bot);
    var lft=mkbox(WALL_VIS,FRAME_H-2*WALL_VIS,FRAME_D,bm); lft.position.set(-FRAME_W/2+WALL_VIS/2,0,bz); tag(lft,'structure'); ap(lft);
    var rgt=mkbox(WALL_VIS,FRAME_H-2*WALL_VIS,FRAME_D,bm); rgt.position.set(FRAME_W/2-WALL_VIS/2,0,bz); tag(rgt,'structure'); ap(rgt);

    var hY=FRAME_H/2-HEADER_H;
    var div=mkbox(FRAME_W-2*WALL_VIS,WALL_VIS*0.5,FRAME_D,bm); div.position.set(0,hY,bz); tag(div,'structure'); ap(div);

    var hcY=hY+HEADER_H/2+WALL_VIS*0.25, dd=FRAME_D*0.55;
    [-1,1].forEach(function(s){
      var cx=s*FRAME_W*0.22;
      var col=cyl(DUCT_D/2,dd,M.vent); col.rotation.x=Math.PI/2; col.position.set(cx,hcY,zSign*dd/2); tag(col,'ventilation'); ap(col);
      var dmp=new THREE.Mesh(new THREE.CircleGeometry(DUCT_D/2*0.88,28),M.vent.clone()); dmp.material.side=THREE.DoubleSide; dmp.position.set(cx,hcY,zSign*8); tag(dmp,'ventilation'); ap(dmp); dampers.push(dmp);
    });
    var mnf=mkbox(FRAME_W*0.30,130,110,M.vent); mnf.position.set(0,hcY,zSign*(dd+55)); tag(mnf,'ventilation'); ap(mnf);

    var cas=mkbox(220,140,80,M.data); cas.position.set(0,hcY,zSign*40); tag(cas,'data'); ap(cas);
    var ns=mkbox(150,95,50,M.data); ns.position.set(0,hcY,zSign*105); tag(ns,'data'); ap(ns);
    var dlink=connectPts(cas.position,ns.position,M.data,9); tag(dlink,'data'); ap(dlink);

    var bTop=hY-WALL_VIS*0.25, bBot=-FRAME_H/2+WALL_VIS, bH=bTop-bBot, bcY=(bTop+bBot)/2;
    var iW=FRAME_W-2*WALL_VIS, cW=(iW-PASSAGE_W)/2;

    var eCol=mkbox(cW,bH,FRAME_D*0.5,M.elec); eCol.position.set(-(PASSAGE_W/2+cW/2),bcY,bz); tag(eCol,'electrical'); ap(eCol);
    var pCol=mkbox(cW,bH,FRAME_D*0.5,M.plumb); pCol.position.set(PASSAGE_W/2+cW/2,bcY,bz); tag(pCol,'plumbing'); ap(pCol);

    var eX=eCol.position.x;
    var rad=mkbox(90,70,40,M.elec); rad.position.set(eX,bcY,zSign*25); tag(rad,'electrical'); ap(rad);
    var xfm=mkbox(160,140,110,M.elec); xfm.position.set(eX,bcY,zSign*195); tag(xfm,'electrical'); ap(xfm);
    var ats=mkbox(100,75,65,M.elec); ats.position.set(eX-cW*0.28,bcY,zSign*250); tag(ats,'electrical'); ap(ats);
    var pnl=mkbox(130,170,40,M.elec); pnl.position.set(eX+cW*0.28,bcY,zSign*250); tag(pnl,'electrical'); ap(pnl);
    [connectPts(rad.position,xfm.position,M.elec,10),connectPts(xfm.position,ats.position,M.elec,10),connectPts(ats.position,pnl.position,M.elec,10)].forEach(function(l){tag(l,'electrical');ap(l);});

    var pX=pCol.position.x;
    var con2=cyl(42,50,M.plumb,20); con2.rotation.x=Math.PI/2; con2.position.set(pX,bcY,zSign*25); tag(con2,'plumbing'); ap(con2);
    var rpz=cyl(28,90,M.plumb,18); rpz.rotation.x=Math.PI/2; rpz.position.set(pX,bcY,zSign*190); tag(rpz,'plumbing'); ap(rpz);
    tag(connectPts(con2.position,rpz.position,M.plumb,14),'plumbing'); ap(zoneRegistry.plumbing[zoneRegistry.plumbing.length-1]);

    var dpv=new THREE.Group(); dpv.position.set(-PASSAGE_W*0.94/2,bcY,zSign*10);
    var dpn=mkbox(PASSAGE_W*0.94,bH*0.96,FRAME_D*0.25,M.door); dpn.position.set(PASSAGE_W*0.94/2,0,0); tag(dpn,'structure'); dpv.add(dpn);
    dpv.userData.swingSign=-zSign; doorPivots.push(dpv); ap(dpv);

    var corners=[[offX,offY],[-offX,-offY]];
    if (kind==='pin') {
      corners.forEach(function(c){
        var pin=cyl(PIN_D/2,PIN_PROTRUSION,M.pin); pin.rotation.x=Math.PI/2; pin.position.set(c[0],c[1],PIN_PROTRUSION/2); tag(pin,'lock'); ap(pin);
        var tip=new THREE.Mesh(new THREE.ConeGeometry(PIN_D/2,CHAMFER_H,24),M.pin.clone()); addEdges(tip); tip.rotation.x=Math.PI/2; tip.position.set(c[0],c[1],PIN_PROTRUSION+CHAMFER_H/2); tag(tip,'lock'); ap(tip);
      });
    } else {
      corners.forEach(function(c){
        var pk=cyl(POCKET_D/2,POCKET_DEPTH,M.pocket); pk.rotation.x=Math.PI/2; pk.position.set(c[0],c[1],zSign*POCKET_DEPTH/2); tag(pk,'lock'); ap(pk);
      });
    }
    addShell(g,zSign,M,mkbox,tag);
    return g;
  }

  function addShell(g,zSign,M,mkbox,tag) {
    var wT=20, cw2=CONTAINER_W/2, ch2=CONTAINER_H/2;
    var farZ=zSign*CONTAINER_L, nearZ=zSign*6, midZ=zSign*CONTAINER_L/2;
    var mX=(CONTAINER_W-DOOR_OPEN_W)/2, mY=(CONTAINER_H-DOOR_OPEN_H)/2;
    [[0,ch2-mY/2,nearZ,CONTAINER_W,mY,wT],[0,-ch2+mY/2,nearZ,CONTAINER_W,mY,wT],[-cw2+mX/2,0,nearZ,mX,DOOR_OPEN_H,wT],[cw2-mX/2,0,nearZ,mX,DOOR_OPEN_H,wT]].forEach(function(p){
      var m=mkbox(p[3],p[4],p[5],M.container); m.position.set(p[0],p[1],p[2]); tag(m,'container'); g.add(m);
    });
    var fw=mkbox(CONTAINER_W,CONTAINER_H,wT,M.container); fw.position.set(0,0,farZ); tag(fw,'container'); g.add(fw);
    [[0,ch2,midZ,CONTAINER_W,wT,CONTAINER_L],[0,-ch2,midZ,CONTAINER_W,wT,CONTAINER_L],[-cw2,0,midZ,wT,CONTAINER_H,CONTAINER_L],[cw2,0,midZ,wT,CONTAINER_H,CONTAINER_L]].forEach(function(p){
      var m=mkbox(p[3],p[4],p[5],M.container); m.position.set(p[0],p[1],p[2]); tag(m,'container'); g.add(m);
    });
  }

  threeScene = new THREE.Scene(); threeScene.background = new THREE.Color(0x050508);
  threeCamera = new THREE.PerspectiveCamera(40,1,1,20000);
  threeRenderer = new THREE.WebGLRenderer({antialias:true});
  threeWrap.appendChild(threeRenderer.domElement);

  threeScene.add(new THREE.AmbientLight(0xffffff,0.5));
  var key=new THREE.DirectionalLight(0xffffff,0.9); key.position.set(1500,2000,2500); threeScene.add(key);
  var fill=new THREE.DirectionalLight(0x4488aa,0.3); fill.position.set(-1800,-800,-1500); threeScene.add(fill);

  pinGroup   = buildFrame('pin',   -1);
  pocketGroup= buildFrame('pocket', 1);
  dpsAssembly= new THREE.Group(); dpsAssembly.add(pinGroup,pocketGroup); threeScene.add(dpsAssembly);

  threeTarget = new THREE.Vector3(0,0,FRAME_D/2);
  flyTarget = threeTarget.clone(); flyRadius = threeRadius;

  raycaster = new THREE.Raycaster(); mouseVec = new THREE.Vector2();
  threeWrap.addEventListener('click', onModelClick);

  function resize() {
    var w=threeWrap.clientWidth, h=threeWrap.clientHeight;
    threeRenderer.setSize(w,h); threeCamera.aspect=w/h; threeCamera.updateProjectionMatrix();
  }
  window.addEventListener('resize',resize); resize();

  function updateCam() {
    threeCamera.position.x=threeTarget.x+threeRadius*Math.sin(threePhi)*Math.sin(threeTheta);
    threeCamera.position.y=threeTarget.y+threeRadius*Math.cos(threePhi);
    threeCamera.position.z=threeTarget.z+threeRadius*Math.sin(threePhi)*Math.cos(threeTheta);
    threeCamera.lookAt(threeTarget);
  }

  (function loop(){
    requestAnimationFrame(loop);
    gapCurrent += (gapTarget-gapCurrent)*0.06;
    pocketGroup.position.z = gapCurrent;
    var df=1-Math.min(1,gapCurrent/SEP_GAP);
    dampers.forEach(function(d){d.rotation.y=df*Math.PI/2;});
    doorPivots.forEach(function(p){p.rotation.y=p.userData.swingSign*df*Math.PI/2*0.95;});
    threeTheta += 0.003;
    threeTarget.lerp(flyTarget,0.06); threeRadius+=(flyRadius-threeRadius)*0.06;
    updateCam();
    threeRenderer.render(threeScene,threeCamera);
  })();
}

function initChaos() {
  if (chaosReady) return;
  chaosReady = true;

  chaosScene = new THREE.Scene(); chaosScene.background = new THREE.Color(0x06090f);
  chaosCamera = new THREE.PerspectiveCamera(40,1,1,80000);
  chaosCamera.position.set(0,1200,22000); chaosCamera.lookAt(0,0,0);
  chaosRenderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  threeWrap.appendChild(chaosRenderer.domElement);

  chaosScene.add(new THREE.AmbientLight(0xffffff,0.4));
  var kl=new THREE.DirectionalLight(0xffffff,0.7); kl.position.set(5000,8000,6000); chaosScene.add(kl);

  var boxMat = new THREE.MeshStandardMaterial({color:0x4a5568,roughness:0.8,metalness:0.15,transparent:true,opacity:0.55});
  var wireM  = new THREE.MeshStandardMaterial({color:0xf2a33c,roughness:0.5,metalness:0.2}); // electrical — amber
  var pipeM  = new THREE.MeshStandardMaterial({color:0x4c7ebf,roughness:0.4,metalness:0.3}); // water — blue
  var ductM  = new THREE.MeshStandardMaterial({color:0x7fb3d5,roughness:0.5,metalness:0.2}); // hvac — light blue
  var dataM  = new THREE.MeshStandardMaterial({color:0x3dd6c7,roughness:0.4,metalness:0.2}); // data — cyan

  chaosAssembly = new THREE.Group();

  var CW=2438, CH=2896, CL=12192;
  var gap=1800;

  // Two container boxes
  [-1,1].forEach(function(side){
    var cg=new THREE.Group(); cg.position.x=side*(CW/2+gap/2);
    var wT=18;
    var cw2=CW/2,ch2=CH/2;
    function shell(w,h,d,mat,x,y,z){ var m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),mat); m.position.set(x,y,z); cg.add(m); }
    shell(CW,wT,CL,boxMat,0,ch2,CL/2); shell(CW,wT,CL,boxMat,0,-ch2,CL/2);
    shell(wT,CH,CL,boxMat,-cw2,0,CL/2); shell(wT,CH,CL,boxMat,cw2,0,CL/2);
    shell(CW,CH,wT,boxMat,0,0,CL);
    chaosAssembly.add(cg);
  });

  // Messy utility runs between the containers
  function messyLine(mat, r, startX, startY, startZ, midX, midY, midZ, endX, endY, endZ) {
    function seg(ax,ay,az,bx,by,bz) {
      var p1=new THREE.Vector3(ax,ay,az), p2=new THREE.Vector3(bx,by,bz);
      var dir=new THREE.Vector3().subVectors(p2,p1), len=dir.length();
      var m=new THREE.Mesh(new THREE.CylinderGeometry(r,r,len,8),mat);
      m.position.copy(p1).add(p2).multiplyScalar(0.5);
      m.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.normalize());
      chaosAssembly.add(m);
    }
    seg(startX,startY,startZ,midX,midY,midZ);
    seg(midX,midY,midZ,endX,endY,endZ);
  }

  var lx = CW/2+gap/2, rx = -(CW/2+gap/2);
  // Electrical (amber) — high, sagging
  messyLine(wireM,   18,  lx, CH*0.35,  2000,   200, CH*0.5+300, 1000,  rx, CH*0.28,  3000);
  messyLine(wireM,   14,  lx, CH*0.2,   4000,  -100, CH*0.15,    2500,  rx, CH*0.3,   5000);
  messyLine(wireM,   10,  lx, CH*0.05,  6000,   350, CH*0.4,     4000,  rx, CH*0.1,   7000);

  // Water (blue) — low, wandering
  messyLine(pipeM,   30,  lx, -CH*0.2,  1500,  -400,-CH*0.05,    800,  rx, -CH*0.3,  2500);
  messyLine(pipeM,   24,  lx, -CH*0.35, 5000,   600,-CH*0.2,    3000,  rx, -CH*0.1,  6000);

  // HVAC (light blue) — large, middle height, awkward path
  messyLine(ductM,   55,  lx,  CH*0.1,  1000,   900, CH*0.45,   2000,  rx,  CH*0.05, 4000);
  messyLine(ductM,   48,  lx, -CH*0.05, 8000,  -200, CH*0.2,    5500,  rx, -CH*0.15, 9000);

  // Data (cyan) — thin, multiple runs
  messyLine(dataM,    8,  lx,  CH*0.4,  3000,   500, CH*0.3,    1500,  rx,  CH*0.45, 2000);
  messyLine(dataM,    6,  lx,  CH*0.15, 7000,  -300, CH*0.05,   5000,  rx,  CH*0.2,  8000);
  messyLine(dataM,    5,  lx, -CH*0.1,  9000,   700, CH*0.35,   6000,  rx, -CH*0.05, 10000);

  // Labels (floating text via canvas sprites)
  var labels=[
    {text:'ELECTRICAL',color:'#f2a33c',x: 200,y: CH*0.5+480,z: 1000},
    {text:'WATER',      color:'#4c7ebf',x:-300,y:-CH*0.05+200,z:  800},
    {text:'HVAC',       color:'#7fb3d5',x: 900,y: CH*0.45+220,z: 2000},
    {text:'DATA',       color:'#3dd6c7',x: 500,y: CH*0.3+160, z: 1500}
  ];
  labels.forEach(function(l){
    var cv=document.createElement('canvas'); cv.width=256; cv.height=64;
    var cx2=cv.getContext('2d');
    cx2.clearRect(0,0,256,64);
    cx2.font='bold 28px Helvetica Neue,Helvetica,Arial,sans-serif';
    cx2.fillStyle=l.color;
    cx2.textAlign='center';
    cx2.fillText(l.text,128,40);
    var tex=new THREE.CanvasTexture(cv);
    var sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.85}));
    sp.scale.set(900,225,1);
    sp.position.set(l.x,l.y,l.z);
    chaosAssembly.add(sp);
  });

  chaosScene.add(chaosAssembly);

  function resizeChaos(){
    var w=threeWrap.clientWidth,h=threeWrap.clientHeight;
    chaosRenderer.setSize(w,h); chaosCamera.aspect=w/h; chaosCamera.updateProjectionMatrix();
  }
  window.addEventListener('resize',resizeChaos); resizeChaos();

  (function loop(){
    requestAnimationFrame(loop);

// ============================================================
// MODEL CLICK
// ============================================================
function onModelClick(e) {
  if (!clickEnabled||!dpsReady) return;
  var rect=threeWrap.getBoundingClientRect();
  mouseVec.x=((e.clientX-rect.left)/rect.width)*2-1;
  mouseVec.y=-((e.clientY-rect.top)/rect.height)*2+1;
  raycaster.setFromCamera(mouseVec,threeCamera);
  var hits=raycaster.intersectObjects(dpsAssembly.children,true);
  for (var i=0;i<hits.length;i++){
    var z=hits[i].object.userData.zone;
    if (z&&zoneDetails[z]){ zoneClick(); showZoneDetail(z); applyZoneIsolation(z); return; }
  }
  closeZoneDetail(); applyZoneIsolation(null);
}

function setModelMode(mode,isClickable){
  if (!dpsReady) return;
  gapTarget = mode==='separated' ? SEP_GAP : 0;
  clickEnabled=!!isClickable;
  threeWrap.classList.toggle('clickable',clickEnabled);
  zoneHintEl.classList.toggle('show',clickEnabled);
  closeZoneDetail(); applyZoneIsolation(null);
}

function applyZoneIsolation(zone){
  Object.keys(zoneRegistry).forEach(function(zk){
    zoneRegistry[zk].forEach(function(m){
      var active=(zone===null)||(zk===zone);
      m.material.transparent=true;
      m.material.opacity=active?(m.userData.baseOpacity||1):0.04;
      m.material.depthWrite=active;
    });
  });
}

// ============================================================
// SHOW / HIDE MODELS
// ============================================================
var activeModel = null;

function showModel(which) {
  // Hide both first
  threeWrap.style.opacity='0';
  threeWrap.innerHTML=''; // detach canvases — re-attach below
  threeWrap.classList.remove('visible','clickable');

  if (!which) { activeModel=null; return; }

  if (which==='chaos') {
    initChaos();
    threeWrap.appendChild(chaosRenderer.domElement);
    chaosRenderer.domElement.style.width='100%';
    chaosRenderer.domElement.style.height='100%';
  } else if (which==='dps') {
    initDPS();
    threeWrap.appendChild(threeRenderer.domElement);
    threeRenderer.domElement.style.width='100%';
    threeRenderer.domElement.style.height='100%';
    // re-add click listener since we re-appended
    threeWrap.removeEventListener('click',onModelClick);
    threeWrap.addEventListener('click',onModelClick);
  }

  activeModel=which;
  requestAnimationFrame(function(){ threeWrap.classList.add('visible'); });
}

function heroBuild(){
  if (heroState.built) return;
  var wrap = document.createElement('div');

  wrap.style.cssText = 'position:absolute;inset:0;z-index:1;opacity:0;transition:opacity .8s ease;pointer-events:none;';

    + ' #2a3a55 64%,'     /* lighter slate toward horizon */
    + ' #4a4a5e 82%,'     /* dusk band */
    + ' #6e5a52 93%,'     /* faint warm horizon */
    + ' #3a3340 100%);';  /* ground shadow */
  wrap.appendChild(sky);
  heroState.sky = sky;

  var canvasHost = document.createElement('div');
  canvasHost.id = 'hero-canvas'; canvasHost.style.cssText='position:absolute;inset:0;';
  wrap.appendChild(canvasHost);
  var txt = document.createElement('div');
  txt.id = 'hero-text';
  txt.style.cssText = 'position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;opacity:0;transition:opacity 1s ease;';
txt.innerHTML = '<div style="font-size:clamp(40px,8vw,96px);font-weight:800;letter-spacing:-0.02em;color:#f0f4ff;line-height:1;text-shadow:0 2px 24px rgba(0,10,24,0.95),0 0 12px rgba(0,10,24,0.9);">Grush.</div>'
    + '<div style="font-size:clamp(18px,3vw,34px);font-weight:600;letter-spacing:0.02em;color:#eaf7ff;margin-top:0.5rem;text-shadow:0 2px 20px rgba(0,10,24,0.98),0 0 10px rgba(0,10,24,0.95);">Let\u2019s connect.</div>';
  wrap.appendChild(txt);
  stageEl.appendChild(wrap);
  heroState.wrap = wrap; heroState.textEl = txt;

  var CYAN=0x00c8ff, CHARTREUSE=0xc8ff00, ELECTRIC=0x4dd2ff, STEEL=0x3a4654, STEEL_LT=0x556070;
  var scene = new THREE.Scene();
  var cam = new THREE.PerspectiveCamera(38,1,1,8000);
  var renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  canvasHost.appendChild(renderer.domElement);
  scene.add(new THREE.AmbientLight(0x1a2636,0.5));
  var key=new THREE.DirectionalLight(0x5577aa,0.4); key.position.set(800,1400,1200); scene.add(key);

  function makeUnit(opts){
    var g=new THREE.Group(), W=opts.w||720,H=opts.h||320,D=opts.d||300;
    var bodyMat=new THREE.MeshStandardMaterial({color:opts.color||STEEL,roughness:0.75,metalness:0.2});
    var body=new THREE.Mesh(new THREE.BoxGeometry(W,H,D),bodyMat);
    body.add(new THREE.LineSegments(new THREE.EdgesGeometry(body.geometry),new THREE.LineBasicMaterial({color:0x0a0f1a,transparent:true,opacity:0.5})));
    g.add(body);
    var ribMat=new THREE.MeshStandardMaterial({color:opts.color||STEEL,roughness:0.8,metalness:0.15});
    for(var i=-3;i<=3;i++){var rib=new THREE.Mesh(new THREE.BoxGeometry(6,H*0.9,8),ribMat);rib.position.set(i*W/7,0,D/2+2);g.add(rib);}
    var winMat=new THREE.MeshStandardMaterial({color:0x0c1420,emissive:new THREE.Color(CYAN),emissiveIntensity:0,roughness:0.4});
    var wins=[],nWin=opts.windows!==undefined?opts.windows:4;
    for(var w=0;w<nWin;w++){var win=new THREE.Mesh(new THREE.BoxGeometry(W*0.13,H*0.34,6),winMat.clone());var span=nWin>1?(w/(nWin-1)-0.5):0;win.position.set(span*W*0.62,H*0.04,D/2+6);g.add(win);wins.push(win);}
    var portMat=new THREE.MeshStandardMaterial({color:0x2a323c,roughness:0.5,metalness:0.5});
    var port=new THREE.Mesh(new THREE.BoxGeometry(24,H*0.7,D*0.7),portMat);port.position.set(opts.portSide*(W/2+12),0,0);g.add(port);
    var plC=new THREE.PointLight(CYAN,0,1500,2);plC.position.set(0,0,D*0.2);g.add(plC);
    var plG=new THREE.PointLight(CHARTREUSE,0,900,2);plG.position.set(0,H*0.2,D*0.1);g.add(plG);
    function setLit(v){wins.forEach(function(win){win.material.emissiveIntensity=v*2.0;});plC.intensity=v*1.4;plG.intensity=v*0.5;bodyMat.emissive=new THREE.Color(CYAN);bodyMat.emissiveIntensity=v*0.05;}
    setLit(0);
    return {group:g,setLit:setLit,W:W};
  }
  var cottage=makeUnit({color:STEEL,w:720,windows:4,portSide:+1});
  var uhc=makeUnit({color:STEEL_LT,w:560,windows:2,portSide:-1});
  scene.add(cottage.group); scene.add(uhc.group);

  // Ground plane — faint, sits the units in a landscape. Hidden until twilight.
  var groundMat = new THREE.MeshStandardMaterial({color:0x2a3142, roughness:0.95, metalness:0.0, transparent:true, opacity:0});

  }
  var coreMat=new THREE.SpriteMaterial({color:ELECTRIC,transparent:true,opacity:0,blending:THREE.AdditiveBlending});
  var core=new THREE.Sprite(coreMat); core.scale.set(420,420,1); scene.add(core);
  var ring=new THREE.Mesh(new THREE.RingGeometry(40,54,48),new THREE.MeshBasicMaterial({color:CYAN,transparent:true,opacity:0,side:THREE.DoubleSide,blending:THREE.AdditiveBlending}));
  ring.rotation.y=Math.PI/2; scene.add(ring);
  cam.position.set(380,360,1500); cam.lookAt(0,-10,0);

  heroState.renderer=renderer; heroState.scene=scene; heroState.cam=cam;

}

function heroResize(){
  if(!heroState.built) return;
  var w=stageEl.clientWidth, h=stageEl.clientHeight;
  heroState.renderer.setSize(w,h); heroState.cam.aspect=w/h; heroState.cam.updateProjectionMatrix();
}

var HT={ approachEnd:3500, settleEnd:4200, bloomEnd:5400, holdEnd:9800 };
function heroEase(t){ return t<0.5?2*t*t:1-Math.pow(-2*t+2,2)/2; }
function heroClamp(v){ return v<0?0:v>1?1:v; }

function heroFrame(now){
  if(!heroState.active) return;
  var t=now-heroState.t0, tsec=now*0.001;
  var c=heroState.cottage, u=heroState.uhc;
  var cottageHome=-(c.W/2+12), uhcHome=(u.W/2+12), startGap=1700;
  var ap=heroClamp(t/HT.approachEnd), e=heroEase(ap);
  c.group.position.x=cottageHome-(1-e)*startGap;
  u.group.position.x=uhcHome+(1-e)*startGap;
  if(t>HT.approachEnd && t<HT.settleEnd){var st=(t-HT.approachEnd)/(HT.settleEnd-HT.approachEnd),nudge=Math.sin(st*Math.PI)*6;c.group.position.x=cottageHome+nudge;u.group.position.x=uhcHome-nudge;}
  else if(t>=HT.settleEnd){c.group.position.x=cottageHome;u.group.position.x=uhcHome;}
  var lit=0,energy=0,ringO=0,ringS=1,coreO=0;
  if(t>HT.settleEnd){
    if(t<HT.bloomEnd){var bb=(t-HT.settleEnd)/(HT.bloomEnd-HT.settleEnd);lit=heroEase(bb);energy=Math.sin(bb*Math.PI)*1.0+0.15;ringO=Math.sin(bb*Math.PI)*0.9;ringS=1+bb*2.4;coreO=Math.sin(bb*Math.PI)*0.85;}
    else {lit=1;energy=0.18+Math.sin(tsec*2.0)*0.06;coreO=0.14;ringO=0;}
  }
  c.setLit(lit); u.setLit(lit*0.55);
  heroState.boltGroup.visible=energy>0.01;
  heroState.bolts.forEach(function(bolt){
    if(energy>0.01){
      var pos=bolt.geo.attributes.position,N=pos.count,a0=bolt.phase+tsec*bolt.speed,sweep=Math.PI*1.1,tilt=bolt.tilt+Math.sin(tsec*0.3)*0.4;
      for(var i=0;i<N;i++){var f=i/(N-1),ang=a0+f*sweep;var ox=Math.cos(ang)*760;var oy=Math.sin(ang)*300*Math.cos(tilt);var oz=Math.sin(ang)*320*Math.sin(tilt)+Math.cos(ang)*320*0.3;var j=energy*(60+Math.random()*120);ox+=(Math.random()-0.5)*j;oy+=(Math.random()-0.5)*j;oz+=(Math.random()-0.5)*j;pos.setXYZ(i,ox,oy,oz);}
      pos.needsUpdate=true;
    }
    bolt.mat.opacity=energy>0.01?energy*(0.5+Math.random()*0.5):0;
  });
  heroState.coreMat.opacity=coreO; heroState.ring.material.opacity=ringO; heroState.ring.scale.set(ringS,ringS,1);
  heroState.cam.position.x=380+Math.sin(now*0.00018)*60; heroState.cam.lookAt(0,-10,0);

  // text lands on the illumination beat
  if(t>HT.settleEnd+200){ heroState.textEl.style.opacity='1'; }

  // twilight blooms in on connection — sky fades up, ground appears
  if(t>HT.settleEnd){
    if(heroState.sky) heroState.sky.style.opacity='1';
    if(heroState.groundMat) heroState.groundMat.opacity = Math.min(0.85, (t-HT.settleEnd)/1400);
  }

  heroState.renderer.render(heroState.scene, heroState.cam);
  heroState.raf=requestAnimationFrame(heroFrame);
}

function heroStart(){
  heroBuild();

  heroState.textEl.style.opacity='0';
  if(heroState.sky) heroState.sky.style.opacity='0';
  if(heroState.groundMat) heroState.groundMat.opacity=0;
  heroState.wrap.style.opacity='1';
  cancelAnimationFrame(heroState.raf);

function heroStop(){
  heroState.active=false;
  cancelAnimationFrame(heroState.raf);
  clearTimeout(heroState.advanceTimer);
  if(heroState.wrap){ heroState.wrap.style.opacity='0'; }
  if(heroState.textEl){ heroState.textEl.style.opacity='0'; }
}

(function(){
  // If already entered this session, skip the gate+splash entirely.
  var entered=false; try{ entered=sessionStorage.getItem('grushEntered')==='1'; }catch(e){}
  var gateEl=document.getElementById('gate');

// ---------- AUDIO: reuse the connector-snap character from the site ----------
var ctx=null, masterGain=null;
function initAudio(){
  if(ctx) return;
  try{
    ctx=new (window.AudioContext||window.webkitAudioContext)();
    masterGain=ctx.createGain(); masterGain.gain.value=0.18; masterGain.connect(ctx.destination);
  }catch(e){}
}
function snap(loud){
  if(navigator.vibrate) navigator.vibrate(loud?[26]:[14]);
  if(!ctx) return;
  var t=ctx.currentTime, vol=loud?1.15:0.7;

  // 1) Body thud — tight, punchy low (the "weight" of the lock)
  var thud=ctx.createOscillator(), tg=ctx.createGain();
  thud.type='sine'; thud.frequency.setValueAtTime(150,t); thud.frequency.exponentialRampToValueAtTime(50,t+0.028);
  tg.gain.setValueAtTime(0,t); tg.gain.linearRampToValueAtTime(1.5*vol,t+0.002); tg.gain.exponentialRampToValueAtTime(0.0008,t+0.04);
  thud.connect(tg); tg.connect(masterGain); thud.start(t); thud.stop(t+0.045);

  // 2) Crisp CLACK transient — bright high-passed noise burst, very short = "crisp"
  var bs=Math.floor(ctx.sampleRate*0.014), buf=ctx.createBuffer(1,bs,ctx.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<bs;i++){ d[i]=(Math.random()*2-1)*(1-i/bs); } // decaying noise = sharper edge
  var n=ctx.createBufferSource(); n.buffer=buf;
  var hp=ctx.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=4200; hp.Q.value=0.9;
  var ng=ctx.createGain(); ng.gain.setValueAtTime(1.5*vol,t); ng.gain.exponentialRampToValueAtTime(0.0008,t+0.014);
  n.connect(hp); hp.connect(ng); ng.connect(masterGain); n.start(t); n.stop(t+0.016);

  // 3) Metallic CLICK — short bright tone for the "connector" snap character
  var r=ctx.createOscillator(), rg=ctx.createGain();
  r.type='square'; r.frequency.setValueAtTime(880,t+0.001); r.frequency.exponentialRampToValueAtTime(470,t+0.02);
  rg.gain.setValueAtTime(0,t+0.001); rg.gain.linearRampToValueAtTime(0.42*vol,t+0.004); rg.gain.exponentialRampToValueAtTime(0.0008,t+0.03);
  var bp=ctx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=1.6;
  r.connect(bp); bp.connect(rg); rg.connect(masterGain); r.start(t+0.001); r.stop(t+0.032);

  // 4) High tick on top — adds the "crisp" sparkle edge, loud snaps only
  if(loud){
    var k=ctx.createOscillator(), kg=ctx.createGain();
    k.type='triangle'; k.frequency.setValueAtTime(2400,t); k.frequency.exponentialRampToValueAtTime(1600,t+0.012);
    kg.gain.setValueAtTime(0,t); kg.gain.linearRampToValueAtTime(0.28*vol,t+0.002); kg.gain.exponentialRampToValueAtTime(0.0008,t+0.02);
    k.connect(kg); kg.connect(masterGain); k.start(t); k.stop(t+0.022);
  }
}
// soft rising hum for the magnet ignition (charging up)
function hum(){
  if(!ctx) return;
  var t=ctx.currentTime;
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.type='sine'; o.frequency.setValueAtTime(180,t); o.frequency.exponentialRampToValueAtTime(560,t+0.55);
  g.gain.setValueAtTime(0,t); g.gain.linearRampToValueAtTime(0.55,t+0.28); g.gain.exponentialRampToValueAtTime(0.0008,t+0.65);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.7);
}

// connection ping — a clean rising note per cottage as it powers on.
// step 0..3 climbs a pentatonic-ish run so you HEAR energy ripple tile->tile.
function ping(step){
  if(!ctx) return;
  var freqs=[523.25, 659.25, 783.99, 1046.50]; // C5 E5 G5 C6 — bright, ascending
  var f=freqs[step]||freqs[0];
  var t=ctx.currentTime;
  var o=ctx.createOscillator(), g=ctx.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(f,t);
  g.gain.setValueAtTime(0,t);
  g.gain.linearRampToValueAtTime(0.32,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0008,t+0.5);
  // a touch of shimmer
  var o2=ctx.createOscillator(), g2=ctx.createGain();
  o2.type='sine'; o2.frequency.setValueAtTime(f*2,t);
  g2.gain.setValueAtTime(0,t); g2.gain.linearRampToValueAtTime(0.10,t+0.012); g2.gain.exponentialRampToValueAtTime(0.0008,t+0.32);
  o.connect(g); g.connect(masterGain); o.start(t); o.stop(t+0.55);
  o2.connect(g2); g2.connect(masterGain); o2.start(t); o2.stop(t+0.4);
}

// sustained POWERED-UP hum — starts when the system goes live, holds underneath.
// two slightly-detuned low oscillators for a warm living drone, low volume.
var humNodes=null;
function powerHum(){
  if(!ctx) return;
  stopHum(); // safety
  var t=ctx.currentTime;
  var bus=ctx.createGain(); bus.gain.setValueAtTime(0,t);
  bus.gain.linearRampToValueAtTime(0.22,t+0.9); // fade in over ~0.9s
  bus.connect(masterGain);
  // gentle lowpass so it's warm, not buzzy
  var lp=ctx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=420; lp.Q.value=0.4;
  lp.connect(bus);
  var a=ctx.createOscillator(); a.type='sine'; a.frequency.value=72;
  var b=ctx.createOscillator(); b.type='sine'; b.frequency.value=72.4; // detune -> slow beat
  var c=ctx.createOscillator(); c.type='triangle'; c.frequency.value=144; // soft harmonic
  var cg=ctx.createGain(); cg.gain.value=0.18; c.connect(cg); cg.connect(lp);
  a.connect(lp); b.connect(lp);
  // slow LFO shimmer on the filter for a "living" feel
  var lfo=ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.12;
  var lfoG=ctx.createGain(); lfoG.gain.value=60; lfo.connect(lfoG); lfoG.connect(lp.frequency);
  a.start(t); b.start(t); c.start(t); lfo.start(t);
  humNodes={bus:bus, oscs:[a,b,c,lfo]};
}
function stopHum(){
  if(!ctx||!humNodes) return;
  var t=ctx.currentTime, n=humNodes; humNodes=null;
  try{
    n.bus.gain.cancelScheduledValues(t);
    n.bus.gain.setValueAtTime(n.bus.gain.value,t);
    n.bus.gain.linearRampToValueAtTime(0.0001,t+0.6); // fade out on dissolve
    n.oscs.forEach(function(o){ try{o.stop(t+0.65);}catch(e){} });
  }catch(e){}
}

// ---------- SEQUENCE ----------
var tiles={
  grow:   document.getElementById('tile-grow'),
  myc:    document.getElementById('tile-myc'),
  office: document.getElementById('tile-office'),
  shop:   document.getElementById('tile-shop')
};
// scattered start offsets (where each drifts in from) — px from final seat
var startPos={
  grow:   {x:-260, y:-200, r:-14},
  myc:    {x: 280, y:-170, r: 12},
  office: {x:-300, y: 190, r: 10},
  shop:   {x: 250, y: 230, r:-12}
};
var core=document.getElementById('core');
var shock=document.getElementById('shock');
var seamV=document.getElementById('seam-v');
var seamH=document.getElementById('seam-h');
var wordmark=document.getElementById('wordmark');
var splash=document.getElementById('splash');

var timers=[];
function after(ms,fn){ timers.push(setTimeout(fn,ms)); }
function clearAll(){ timers.forEach(clearTimeout); timers=[]; }

function setStart(){
  Object.keys(tiles).forEach(function(k){
    var p=startPos[k], el=tiles[k];
    el.style.transition='none';
    el.style.opacity='0';
    el.style.transform='translate('+p.x+'px,'+p.y+'px) rotate('+p.r+'deg) scale(0.7)';
    el.classList.remove('live','lit');
    var g=el.querySelector('.glow'); if(g) g.style.opacity='0';
  });
  core.style.transition='none'; core.style.opacity='0'; core.style.transform='translate(-50%,-50%) scale(0)';
  shock.style.transition='none'; shock.style.opacity='0'; shock.style.transform='translate(-50%,-50%) scale(0.2)';
  seamV.style.transition='none'; seamV.style.opacity='0';
  seamH.style.transition='none'; seamH.style.opacity='0';
  wordmark.classList.remove('show');
  splash.classList.remove('gone'); 
  // force reflow
  void splash.offsetWidth;
}

function run(){
  clearAll(); stopHum(); setStart();

  // PHASE 1 — drift in, scattered, dead/gray, loose hover (0–1100ms)
  Object.keys(tiles).forEach(function(k,i){
    var p=startPos[k], el=tiles[k];
    after(120+i*90,function(){
      el.style.transition='transform 0.85s cubic-bezier(.22,.9,.3,1), opacity 0.5s ease';
      el.style.opacity='1';
      // settle near-but-not-quite into a loose grid (slight offset + jitter)
      var jx=(p.x>0?1:-1)*14, jy=(p.y>0?1:-1)*12;
      el.style.transform='translate('+jx+'px,'+jy+'px) rotate('+(p.r*0.3)+'deg) scale(1)';
    });
  });

  // PHASE 2 — ignition: cyan core flares at center (1150ms)
  after(1150,function(){
    hum();
    core.style.transition='opacity .25s ease, transform .35s cubic-bezier(.3,1.4,.5,1)';
    core.style.opacity='1';
    core.style.transform='translate(-50%,-50%) scale(1.3)';
  });

  // PHASE 3 — THE SNAP: magnet yanks all four into perfect 2x2 (1400ms)
  after(1400,function(){
    snap(true);
    Object.keys(tiles).forEach(function(k){
      var el=tiles[k];
      el.style.transition='transform 0.34s cubic-bezier(.5,-0.4,.3,1.5)'; // overshoot+settle
      el.style.transform='translate(0,0) rotate(0deg) scale(1)';
    });
    // core blooms then fades as energy disperses into tiles
    core.style.transition='opacity .4s ease, transform .4s ease';
    core.style.transform='translate(-50%,-50%) scale(2.4)';
    core.style.opacity='0';
    // shockwave ring
    shock.style.transition='transform .55s cubic-bezier(.2,.7,.3,1), opacity .55s ease';
    shock.style.opacity='1'; shock.style.transform='translate(-50%,-50%) scale(1.05)';
    after(120,function(){ shock.style.opacity='0'; });
    // seam cross pulse
    seamV.style.transition='opacity .12s ease'; seamH.style.transition='opacity .12s ease';
    seamV.style.opacity='1'; seamH.style.opacity='1';
    after(260,function(){ seamV.style.opacity='0'; seamH.style.opacity='0'; });
  });

  // PHASE 4 — power-on cascade: color + icons light up, rippling from center (1620ms+)
  var liveOrder=['grow','myc','office','shop']; // ripple outward
  liveOrder.forEach(function(k,i){
    after(1620+i*90,function(){
      tiles[k].classList.add('live');
      snap(false);
      ping(i); // rising connection note per cottage — energy ripples tile to tile
    });
  });

  // system is now LIVE — sustained powered-up hum fades in under everything
  after(1620+3*90+120,function(){ powerHum(); });

  // PHASE 5 — wordmark + settle (2150ms)
  after(2150,function(){ wordmark.classList.add('show'); });

  // PHASE 6 — dissolve into site (2900ms)
  after(2900,function(){
    splash.classList.add('gone');
    /* real site already rendered underneath */
    stopHum(); // powered-up hum fades out as the splash hands off to the site
  });
}


// ---------- POWER-ON GATE ----------
// The click is the user gesture that unlocks browser audio, so the FIRST
// play of the animation has full sound. Gate dissolves, then the splash runs.
var gate=document.getElementById('gate');
function powerOn(){
  initAudio();
  if(ctx&&ctx.state==='suspended') ctx.resume();
  // a confirming snap on the button press itself
  after(0,function(){ snap(true); });
  gate.classList.add('gone');
  // start the animation as the gate fades out
  after(450,function(){ run(); });
  try{ sessionStorage.setItem('grushEntered','1'); }catch(e){}
}
var powerBtn_=document.getElementById('power-btn');
if(powerBtn_){
  powerBtn_.addEventListener('click',function(e){ e.stopPropagation(); powerOn(); });
  powerBtn_.setAttribute('tabindex','0');
  powerBtn_.addEventListener('keydown',function(e){ if(e.key==='Enter'||e.key===' '){ e.preventDefault(); powerOn(); } });
}

})();
/* ===== END INTRO SPLASH ===== */
</script>
